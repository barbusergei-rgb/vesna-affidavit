<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vesna — Klientské prohlášení</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+Display:ital,wght@0,400;0,600;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --color-pink:      #FFC3CC;
      --color-rose:      #CE567C;
      --color-bg:        #FDF8F6;
      --color-text:      #2A2A2A;
      --color-text-soft: #7A6E6A;
      --deep:            #3a1020;
      --white:           #ffffff;
    }

    body {
      background: var(--color-bg);
      min-height: 100dvh;
      display: grid;
      place-items: center;
      font-family: 'Jost', sans-serif;
      padding: 40px 24px;
    }

    /* ── Card ── */
    .page {
      width: 100%;
      max-width: 820px;
      display: grid;
      grid-template-columns: 1fr 1px 1fr;
      background: var(--white);
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.07);
      overflow: hidden;
      animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Left panel ── */
    .panel-left {
      padding: 56px 48px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 40px;
      background: var(--white);
    }

    .logo-wrap img {
      width: 130px;
      height: auto;
      display: block;
    }

    .copy {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
    }

    .eyebrow {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--color-rose);
    }

    .headline {
      font-family: 'Noto Serif Display', serif;
      font-weight: 300;
      font-size: 36px;
      line-height: 1.15;
      color: var(--color-text);
      letter-spacing: -0.5px;
    }

    .headline em {
      font-style: italic;
      color: var(--color-rose);
    }

    .accent-bar {
      width: 40px;
      height: 2px;
      background: var(--color-pink);
      border-radius: 2px;
    }

    .body-text {
      font-size: 14px;
      font-weight: 400;
      color: var(--color-text-soft);
      line-height: 1.75;
      max-width: 30ch;
    }

    .footer-info {
      font-size: 11px;
      color: var(--color-text-soft);
      line-height: 1.8;
    }

    /* ── Divider ── */
    .divider-v {
      background: linear-gradient(to bottom, transparent, var(--color-pink) 20%, var(--color-pink) 80%, transparent);
      opacity: 0.5;
    }

    /* ── Right panel ── */
    .panel-right {
      padding: 56px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: linear-gradient(160deg, #FFF5F7 0%, #FDF8F6 100%);
    }

    .qr-frame {
      padding: 18px;
      background: var(--white);
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.07);
      border: 1px solid rgba(255,195,204,0.5);
      animation: float 5s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-6px); }
    }

    #qrcode canvas {
      border-radius: 6px;
      display: block;
    }

    .qr-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .qr-label-text {
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text);
    }

    .qr-url {
      font-size: 11px;
      color: var(--color-text-soft);
      letter-spacing: 0.3px;
    }

    /* ── Print button ── */
    .print-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 32px;
      animation: fadeUp 0.8s 0.2s cubic-bezier(0.16,1,0.3,1) both;
    }

    .btn-print {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--color-rose);
      color: var(--white);
      border: none;
      border-radius: 50px;
      padding: 13px 32px;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.4px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-print:hover {
      background: var(--deep);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(206,86,124,0.3);
    }

    .btn-print:active {
      transform: translateY(0) scale(0.98);
    }

    .btn-print svg { width: 15px; height: 15px; flex-shrink: 0; }

    .print-hint {
      font-size: 11px;
      color: var(--color-text-soft);
      letter-spacing: 0.2px;
    }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      body { padding: 20px 16px; }
      .page { grid-template-columns: 1fr; border-radius: 20px; }
      .divider-v { display: none; }
      .panel-left { padding: 40px 32px 32px; gap: 28px; }
      .panel-right { padding: 32px 32px 40px; }
      .headline { font-size: 28px; }
      .body-text { max-width: 100%; }
    }

    /* ── Print ── */
    @media print {
      @page { margin: 0; size: A4; }

      * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

      body {
        background: var(--color-bg);
        padding: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .page {
        width: 100%;
        max-width: 100%;
        min-height: 100vh;
        border-radius: 0;
        box-shadow: none;
        grid-template-columns: 1fr 1px 1fr;
      }

      .panel-left {
        padding: 60px 52px;
        background: var(--white);
      }

      .panel-right {
        background: linear-gradient(160deg, #FFF5F7 0%, #FDF8F6 100%);
        padding: 60px 52px;
      }

      .qr-frame {
        animation: none;
        box-shadow: none;
        border: 1px solid rgba(255,195,204,0.6);
      }

      .print-row { display: none; }
    }
  </style>
</head>
<body>

<div class="page">

  <!-- Left -->
  <div class="panel-left">
    <div class="logo-wrap">
      <img src="logo.png" alt="Vesna Tattoo Boutique">
    </div>

    <div class="copy">
      <div class="eyebrow">Klientský portál</div>
      <h1 class="headline">Vyplňte<br><em>prohlášení</em><br>před návštěvou</h1>
      <div class="accent-bar"></div>
      <p class="body-text">
        Naskenujte kód svým telefonem, vyplňte formulář a podepište souhlas — vše za pár minut.
      </p>
    </div>

    <div class="footer-info">
      Náměstí Míru 18, Praha 2<br>
      vesnatattoo.com
    </div>
  </div>

  <!-- Divider -->
  <div class="divider-v" aria-hidden="true"></div>

  <!-- Right -->
  <div class="panel-right">
    <div class="qr-frame">
      <div id="qrcode"></div>
    </div>
    <div class="qr-label">
      <span class="qr-label-text">Klientské prohlášení</span>
      <span class="qr-url">vesna-affidavit.vercel.app</span>
    </div>
  </div>

</div>

<div class="print-row">
  <button class="btn-print" onclick="window.print()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
      <rect x="6" y="14" width="12" height="8" rx="1"/>
    </svg>
    Tisknout
  </button>
  <span class="print-hint">nebo Tisk → Uložit jako PDF</span>
</div>

<script>
  new QRCode(document.getElementById('qrcode'), {
    text: 'https://vesna-affidavit.vercel.app',
    width: 200,
    height: 200,
    colorDark: '#3a1020',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H,
  });
</script>

</body>
</html>
