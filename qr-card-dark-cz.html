<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vesna — Klientská karta A4</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Display:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 210mm;
    height: 297mm;
    background: #2d0915;
  }

  .card {
    width: 210mm;
    height: 297mm;
    background: #2d0915;
    font-family: 'Jost', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10mm;
    position: relative;
    overflow: hidden;
  }

  /* subtle warm bloom — top right, like the website hero */
  .card::before {
    content: '';
    position: absolute;
    top: -20mm;
    right: -20mm;
    width: 90mm;
    height: 90mm;
    background: radial-gradient(ellipse at center, rgba(255,140,180,0.28) 0%, transparent 70%);
    pointer-events: none;
  }
  .card::after {
    content: '';
    position: absolute;
    bottom: -10mm;
    left: -10mm;
    width: 60mm;
    height: 60mm;
    background: radial-gradient(ellipse at center, rgba(200,60,110,0.22) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ─── SPACER TOP ─── */
  .top-space { height: 8mm; flex-shrink: 0; }

  /* ─── HEADLINE — editorial centered ─── */
  .headline {
    width: 100%;
    text-align: center;
    margin-bottom: 5mm;
    position: relative;
    z-index: 1;
  }

  /* Golden ratio scale: 54pt → ÷φ → 33pt → ÷φ → 21pt → ÷φ → 13pt → ÷φ → 8pt */
  .hl-small {
    font-family: 'Jost', sans-serif;
    font-size: 16pt;
    font-weight: 500;
    color: #CC8AAA;
    letter-spacing: 3px;
    text-transform: uppercase;
    display: block;
    margin-bottom: 2mm;
  }

  .hl-big {
    font-family: 'Noto Serif Display', serif;
    font-size: 68pt;
    font-weight: 300;
    font-style: italic;
    color: #FF9DC0;
    letter-spacing: -3px;
    display: block;
    line-height: 0.86;
  }

  .hl-small-2 {
    font-family: 'Noto Serif Display', serif;
    font-size: 26pt;
    font-weight: 400;
    font-style: normal;
    color: #FFE4EE;
    letter-spacing: 0.2px;
    display: block;
    margin-top: 3mm;
  }

  /* ─── QR BLOCK ─── */
  .qr-block {
    width: 72%;
    position: relative;
    z-index: 1;
    margin: 0 auto 8mm;
    flex-shrink: 0;
  }

  /* ─── LIQUID GLASS FRAME ─── */
  .qr-frame {
    background: rgba(255,255,255,0.09);
    backdrop-filter: blur(22px) saturate(1.6) brightness(1.05);
    -webkit-backdrop-filter: blur(22px) saturate(1.6) brightness(1.05);
    border: 1px solid rgba(255,255,255,0.24);
    border-radius: 28px;
    padding: 5mm;
    width: 100%;
    position: relative;
    box-shadow:
      inset 0 1.5px 0 rgba(255, 255, 255, 0.9),
      inset 0 -1px 0 rgba(206, 86, 124, 0.1),
      0 12px 40px rgba(255,100,150,0.25),
      0 4px 16px rgba(0, 0, 0, 0.07),
      0 0 0 0.5px rgba(206, 86, 124, 0.15);
  }

  #qrcode {
    width: 100%;
  }

  #qrcode canvas,
  #qrcode img {
    display: block;
    width: 100% !important;
    height: auto !important;
    border-radius: 8px;
  }

  /* ─── BELOW QR ─── */
  .below-qr {
    width: 100%;
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    gap: 3mm;
  }

  .invite-text {
    font-family: 'Jost', sans-serif;
    font-size: 14pt;
    font-weight: 400;
    color: #FFBCD5;
    line-height: 1.75;
    letter-spacing: 0.1px;
    max-width: 85%;
  }

  .qr-url {
    font-family: 'Jost', sans-serif;
    font-size: 11pt;
    font-weight: 600;
    color: #FF9DC0;
    letter-spacing: 0.5px;
  }

  /* ─── FOOTER ─── */
  .footer {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 5mm;
    margin-top: 5mm;
    border-top: 0.5px solid rgba(255,180,210,0.2);
    position: relative;
    z-index: 1;
    flex-shrink: 0;
  }

  .footer-addr {
    font-size: 10pt;
    font-weight: 300;
    color: #FFBCD5;
    line-height: 1.6;
    letter-spacing: 0.1px;
  }

  .footer-web {
    font-size: 10pt;
    font-weight: 500;
    color: #FF9DC0;
    letter-spacing: 0.3px;
  }

  @media print {
    html, body { width: 210mm; height: 297mm; }
    @page { size: A4 portrait; margin: 0; }
    .card { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
